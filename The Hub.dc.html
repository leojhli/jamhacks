<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Hub - Know what to do next</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Geist:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=58">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><img src="/assets/grape-mascot.png?v=4" alt=""></div>
        <div><strong>The Hub</strong><small>Calm planning</small></div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="pixel-buddy" aria-hidden="true">
        <div class="pb-speech">
          <span>lock in lil bro</span>
          <span>get to work buddy</span>
          <span>stop scrolling &#128128;</span>
          <span>the grind don't stop</span>
          <span>no excuses, study!</span>
        </div>
        <span class="pb-note pb-note-1">&#9834;</span>
        <span class="pb-note pb-note-2">&#9835;</span>
        <svg class="pixel-dancer" viewBox="0 0 14 16" width="66" height="76" shape-rendering="crispEdges">
          <g>
            <rect x="6" y="0" width="1" height="2" fill="#6b4a2a"/>
            <rect x="7" y="0" width="2" height="1" fill="#5fae3f"/>
            <rect x="8" y="1" width="1" height="1" fill="#5fae3f"/>
            <rect x="4" y="2" width="6" height="1" fill="#7c4dbe"/>
            <rect x="3" y="3" width="8" height="7" fill="#7c4dbe"/>
            <rect x="3" y="10" width="8" height="1" fill="#5e379c"/>
            <rect x="4" y="11" width="6" height="1" fill="#5e379c"/>
            <rect x="3" y="3" width="1" height="3" fill="#9d6fe0"/>
            <rect x="4" y="2" width="2" height="1" fill="#9d6fe0"/>
            <rect x="5" y="4" width="1" height="2" fill="#ffffff"/>
            <rect x="8" y="4" width="1" height="2" fill="#ffffff"/>
            <rect x="5" y="5" width="1" height="1" fill="#2a1840"/>
            <rect x="8" y="5" width="1" height="1" fill="#2a1840"/>
            <rect x="4" y="7" width="1" height="1" fill="#ff8fb0"/>
            <rect x="9" y="7" width="1" height="1" fill="#ff8fb0"/>
            <rect x="6" y="8" width="2" height="1" fill="#2a1840"/>
          </g>
          <g class="pd-frame pd-a">
            <rect x="2" y="3" width="1" height="1" fill="#7c4dbe"/>
            <rect x="1" y="2" width="1" height="1" fill="#9d6fe0"/>
            <rect x="11" y="6" width="1" height="1" fill="#7c4dbe"/>
            <rect x="12" y="7" width="1" height="1" fill="#7c4dbe"/>
            <rect x="4" y="12" width="1" height="2" fill="#7c4dbe"/>
            <rect x="9" y="12" width="1" height="2" fill="#7c4dbe"/>
            <rect x="3" y="14" width="2" height="1" fill="#3d2566"/>
            <rect x="9" y="14" width="2" height="1" fill="#3d2566"/>
          </g>
          <g class="pd-frame pd-b">
            <rect x="2" y="6" width="1" height="1" fill="#7c4dbe"/>
            <rect x="1" y="7" width="1" height="1" fill="#7c4dbe"/>
            <rect x="11" y="3" width="1" height="1" fill="#7c4dbe"/>
            <rect x="12" y="2" width="1" height="1" fill="#9d6fe0"/>
            <rect x="5" y="12" width="1" height="2" fill="#7c4dbe"/>
            <rect x="8" y="12" width="1" height="2" fill="#7c4dbe"/>
            <rect x="4" y="14" width="2" height="1" fill="#3d2566"/>
            <rect x="8" y="14" width="2" height="1" fill="#3d2566"/>
          </g>
        </svg>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <label class="search">
          <span>Search</span>
          <input id="searchInput" placeholder="Find a page..." autocomplete="off">
        </label>
        <div class="tonight-progress" id="tonightProgress" hidden>
          <div class="tonight-progress-copy">
            <strong>Tonight's progress</strong>
            <span id="tonightProgressLabel">0 of 0 activities started</span>
          </div>
          <div class="tonight-progress-track" role="progressbar" aria-label="Tonight's activity progress" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0">
            <span id="tonightProgressFill"></span>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="notifyBtn" type="button" aria-label="Notifications">N</button>
          <div class="profile-wrap">
            <button class="profile-button" id="profileButton" type="button" aria-expanded="false" aria-controls="profileMenu">
              <span class="avatar">AC</span>
              <span class="profile-copy"><strong>Alex Chen</strong><small>Grade 12</small></span>
            </button>
            <div class="profile-menu" id="profileMenu" hidden>
              <div id="signedInProfile">
                <strong>Alex Chen</strong>
                <small>alex.chen@school.edu</small>
                <button type="button" id="syncGoogleBtn">Connect Google Classroom</button>
                <button type="button" id="signOutBtn">Sign out</button>
              </div>
              <div id="signedOutProfile" hidden>
                <button type="button" id="signInBtn">Sign in with Google</button>
                <button type="button" id="continueDemoBtn">Continue in Demo Mode</button>
              </div>
            </div>
          </div>
        </div>
      </header>
      <main id="main" tabindex="-1"></main>
    </div>
  </div>

  <section class="coach" id="coachPanel" aria-label="Hub Coach" hidden>
    <header>
      <img class="coach-mascot" src="/assets/grape-mascot.png?v=4" alt="">
      <div class="coach-heading"><strong>Hub Coach</strong><small>Plan it. Start it. Keep moving.</small></div>
      <button class="icon-button" id="closeCoachBtn" type="button" aria-label="Close Hub Coach">x</button>
    </header>
    <div class="coach-log" id="coachLog" aria-live="polite"></div>
    <form class="coach-form" id="coachForm">
      <div class="coach-chips" id="coachChips"></div>
      <div class="coach-input-row">
        <label class="sr-only" for="coachInput">Message Hub Coach</label>
        <input id="coachInput" placeholder="I have 45 minutes and I'm tired..." autocomplete="off">
        <button class="primary-button" type="submit">Send</button>
      </div>
    </form>
  </section>

  <button class="coach-fab" id="coachFab" type="button" aria-label="Talk to Hub Coach" aria-expanded="false" aria-controls="coachPanel">
    <img src="/assets/grape-mascot.png?v=4" alt="">
  </button>
  <div id="sessionRoot"></div>
  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
  <script src="/app.js?v=33"></script>
</body>
</html>
